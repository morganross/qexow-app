name: Build Desktop Executable

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Package Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build and Package
        run: npm run package:win

      - name: Get Version
        id: pkg
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: Qexow v${{ steps.pkg.outputs.version }}
          body: |
            ## Qexow v${{ steps.pkg.outputs.version }}

            ### Download
            Download the portable Windows executable below — no installation required, just run it.

            ### What's New
            - Parallel session background execution: switching chats no longer stops a running Codex agent
            - Spinning loader in sidebar for background running sessions
            - Real-time chat history sync when viewing an active background session
            - Native OS window frame with File, View, and About menus
            - Windows Explorer context menu integration ("Open in Qexow")
            - Built-in CodeMirror 6 code editor with syntax highlighting
          draft: false
          prerelease: false
          files: dist_electron/Qexow *.exe
          make_latest: true
